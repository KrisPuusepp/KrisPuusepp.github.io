			var fades = 0
			var autoFaders = 0
			var autoFaderFaders = 0
			function fade() {
				fades++
				if(fades == 69) {
					document.getElementById("fades").innerHTML = fades + " nice";
				} else {
					document.getElementById("fades").innerHTML = fades;
				}
				document.getElementById("gif").src="https://cdn.discordapp.com/attachments/757196042801250365/785908776615804978/khat1.gif";
			}
			function buyAutoFader()
			{
				if(fades >= 50) {
					fades = fades - 50
					autoFaders++
					document.getElementById("faders").innerHTML=autoFaders;
					document.getElementById("buy_fader").innerHTML="fader bought owo";
					self.setTimeout("clearButton('buy_fader', 'Buy autofader: 50 fades')", 2000);
					autoFade()
				} else {
					document.getElementById("buy_fader").innerHTML="not enough fades ;-;";
					self.setTimeout("clearButton('buy_fader')", 2000);
				}
			}
			function buyAutoFaderFader()
			{
				if(fades >= 500) {
					fades = fades - 500
					autoFaderFaders++
					document.getElementById("faderfaders").innerHTML=autoFaderFaders;
					document.getElementById("buy_faderfader").innerHTML="faderfader bought owo";
					self.setTimeout("clearButton('buy_faderfader', 'Buy autofaderfader: 500 fades')", 2000);
					autoFaderFade()
				} else {
					document.getElementById("buy_faderfader").innerHTML="not enough fades ;-;";
					self.setTimeout("clearButton('buy_faderfader', 'Buy autofaderfader: 500 fades')", 2000);
				}
			}

			function clearButton(id, message) {
				document.getElementById(id).innerHTML=message;
			}
			function autoFade()
			{
				fade()
				self.setTimeout("autoFade()", 1000);
			}
			function autoFaderFade()
			{
				autoFaders++
				document.getElementById("faders").innerHTML=autoFaders;
				autoFade()
				self.setTimeout("autoFaderFade()", 10000);
			}
	    </script>
