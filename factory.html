<html>
    <head>
        <style>* {padding: 0; margin: 0}</style>
        <title>Factory</title>
        <meta charset="utf-8">
        <style>
            h1 {text-align: center;}
            p {text-align: center;}
            div {text-align: center;}
        </style>
    </head>
    <script src="pixi/pixi.min.js"></script>
    <body style="background-color: black;">
        <script>
            function lerp(value1, value2, amount) {
                amount = amount < 0 ? 0 : amount;
                amount = amount > 1 ? 1 : amount;
                return value1 + (value2 - value1) * amount;
            }
        </script>

        <script src="factory_rendering.js"></script>
        <script src="factory_inventory.js"></script>


        <script type="text/javascript">
            function tile(ix, iy) {
                this.front = undefined;

                this.back = new PIXI.Graphics();

                this.back.beginFill(0x2E2E2E);
                this.back.drawRect(-tileSize/2 + 1, -tileSize/2 + 1, tileSize - 1, tileSize - 1);
                this.back.endFill();
                this.back.position = {x: tileSize * ix, y: tileSize * iy};
                tileGroup.addChild(this.back);
            }

            function resource_red(ix, iy) {
                this.poly = new PIXI.Graphics();
                this.poly.beginFill(0xFF0000);
                this.poly.drawRect(-tileSize/2 + 1, -tileSize/2 + 1, tileSize - 1, tileSize - 1);
                this.poly.endFill();
                this.poly.position = {x: tileSize * ix, y: tileSize * iy};
                tileGroup.addChild(this.poly);

                this.x = ix;
                this.y = iy;
                this.targetScale = 1;

                this.hp = 4;

                this.poly.lineStyle(1, 0x2E2E2E);

                this.update = function() {
                    this.poly.scale = {x: lerp(this.poly.scale.x, this.targetScale, 0.5), y: lerp(this.poly.scale.y, this.targetScale, 0.5)};
                };
                this.damage = function(amount) {
                    this.hp -= amount;
                    if(this.hp <= 0) {
                        this.collect();
                        delete tiles[this.x][this.y].front;
                    } else {
                        this.poly.moveTo(Math.random() * (-tileSize/2 + 1), (-tileSize/2 + 1));
                        this.poly.lineTo(Math.random() * (tileSize - 1), (tileSize - 1));
                        this.targetScale = 1.5;
                        setTimeout(() => {
                            if(this)
                                this.targetScale = 1;
                        }, 50);
                    }
                };
                this.collect = function() {
                    inv.addResource(0, this.poly.x + tileGroup.x, this.poly.y + tileGroup.y);
                    this.poly.destroy();
                    changeCursor(0);
                }

                this.poly.interactive = true;
                this.poly.on("mouseover", (event) => {
                    changeCursor(1);
                });
                this.poly.on("mouseout", (event) => {
                    changeCursor(0);
                });
                this.poly.on("click", (event) => {
                    this.damage(1);
                });
            }

            var tiles = [];
            for(var i = 0; i < 64; i++) {
                empt = []
                for(var y = 0; y < 36; y++) {
                    empt.push(new tile(i, y));
                }
                tiles.push(empt);
            }

            function setup() {
                for(var i = 0; i < tiles.length; i++) {
                    for(var y = 0; y < tiles[i].length; y++) {
                        if(Math.random() > 0.75)
                            tiles[i][y].front = new resource_red(i, y);
                    }
                }
                
                tileGroup.position = {x: stageWidth - 65*tileSize, y: (stageHeight - 36*tileSize) / 2};

                //Start the game loop by adding the `gameLoop` function to
                //Pixi's `ticker` and providing it with a `delta` argument.
                app.ticker.add(delta => gameLoop(delta));
            }

            var input = new PIXI.InteractionManager(app.renderer);
            function gameLoop(delta) {
                for(var i = 0; i < tiles.length; i++) {
                    for(var y = 0; y < tiles[i].length; y++) {
                        if(tiles[i][y].front != undefined) {
                            tiles[i][y].front.update();
                            if(Math.random() < 0.01)
                                tiles[i][y].front.damage(1);
                        }
                    }
                }
                inv.animUpdate();
            }

            setup()
        </script>
    </body>
</html>
