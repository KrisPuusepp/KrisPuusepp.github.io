        <script>
            //credit: https://stackoverflow.com/questions/1038727/how-to-get-browser-width-using-javascript-code
            // :)
            function getWidth() {
                return Math.max(
                  document.body.scrollWidth,
                  document.documentElement.scrollWidth,
                  document.body.offsetWidth,
                  document.documentElement.offsetWidth,
                  document.documentElement.clientWidth
                );
            }

            function getHeight() {
                return Math.max(
                  document.body.scrollHeight,
                  document.documentElement.scrollHeight,
                  document.body.offsetHeight,
                  document.documentElement.offsetHeight,
                  document.documentElement.clientHeight
                );
            }

            var wavediv1 = document.getElementById("wavediv1");
            var wavediv2 = document.getElementById("wavediv2");

            var body = document.scrollingElement;

            var waves = []
            var frame = 0;

            var len = Math.floor(getHeight() / 18);

            wavediv2.style.marginLeft = (getWidth() - 200) + "px";

            for(var i = 0; i < len; i++) {
                var para = document.createElement("p");
                var node = document.createTextNode("Jänes");
                para.appendChild(node);
                para.style.fontFamily = "arial";
                para.style.margin = "0px";
                para.style.marginLeft = "0px";
                wavediv1.appendChild(para);

                waves[i] = para;
            }

            for(var i = 0; i < len; i++) {
                var para = document.createElement("p");
                var node = document.createTextNode("Jänes");
                para.appendChild(node);
                para.style.fontFamily = "arial";
                para.style.margin = "0px";
                para.style.marginLeft = "0px";
                wavediv2.appendChild(para);

                waves[len + i] = para;
            }

            function Wave() {
                for(var i = 0; i < waves.length; i++) {
                   waves[i].style.marginLeft = (Math.round((Math.sin(frame / 30 + i / 3 + body.scrollTop / 180) + 1) * 30)) + "px";
                }
                frame++;

                self.setTimeout("Wave()", 1000 / 30);
            }
            Wave();
        </script>
