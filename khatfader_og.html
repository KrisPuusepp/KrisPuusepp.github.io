			var fades = 0
			var autoFaders = 0
			function fade() {
				fades++
				if(fades == 69) {
					document.getElementById("fades").innerHTML = fades + " nice";
				} else {
					document.getElementById("fades").innerHTML = fades;
				}
				document.getElementById("gif").src="https://cdn.discordapp.com/attachments/757196042801250365/785908776615804978/khat1.gif";
			}
			function buyAutoFader()
			{
				if(fades >= 50) {
					fades = fades - 50
					autoFaders++
					document.getElementById("faders").innerHTML=autoFaders;
					document.getElementById("btn").innerHTML="fader bought owo";
					self.setTimeout("clearButton()", 2000);
					autoFade()
				} else {
					document.getElementById("btn").innerHTML="not enough fades ;-;";
					self.setTimeout("clearButton()", 2000);
				}
			}
			function clearButton() {
				document.getElementById("btn").innerHTML="Buy autofader: 50 fades";
			}
			function autoFade()
			{
				fade()
				self.setTimeout("autoFade()", 1000);
