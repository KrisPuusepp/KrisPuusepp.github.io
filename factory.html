<html>
    <head>
        <style>* {padding: 0; margin: 0}</style>
        <title>Factory</title>
        <meta charset="utf-8">
        <style>
            h1 {text-align: center;}
            p {text-align: center;}
            div {text-align: center;}

            @font-face {
              font-family: "mainFont";
              src: url("./Resources/fonts/Xolonium-Bold.ttf");
            }

            body {
              overflow: hidden; /* Hide scrollbars */
            }
        </style>
    </head>
    <script src="pixi/pixi.min.js"></script>
    <body style="background-color: black;">
        <script>
            function lerp(value1, value2, amount) {
                amount = amount < 0 ? 0 : amount;
                amount = amount > 1 ? 1 : amount;
                return value1 + (value2 - value1) * amount;
            }
        </script>

        <script src="factory_rendering.js"></script>
        <script src="factory_audio.js"></script>
        <script src="factory_inventory.js"></script>
        <script src="factory_progression.js"></script>


        <script type="text/javascript">
            frame = 0;

            function tile(ix, iy) {
                this.front = undefined;

                this.back = new PIXI.Graphics();

                this.back.beginFill(0x2E2E2E);
                this.back.drawRect(Math.round(-tileSize/2.1), Math.round(-tileSize/2.1), Math.round(tileSize*0.95), Math.round(tileSize*0.95));
                this.back.endFill();
                this.back.position = {x: tileSize * ix, y: tileSize * iy};
                tileGroup.addChild(this.back);
            }

            function resource_red(ix, iy) {
                this.poly = new PIXI.Graphics();
                this.poly.beginFill(0xFF0000);
                this.poly.drawRect(Math.round(-tileSize/2.1), Math.round(-tileSize/2.1), Math.round(tileSize*0.95), Math.round(tileSize*0.95));
                this.poly.endFill();
                this.poly.position = {x: tileSize * ix, y: tileSize * iy};
                this.poly.hitArea = new PIXI.Circle(0, 0, tileSize/2);
                tileGroup.addChild(this.poly);

                this.x = ix;
                this.y = iy;
                this.spawnFrame = frame;

                this.targetScale = 1;

                this.hp = 4;

                this.poly.lineStyle(1, 0x2E2E2E);
                this.poly.rotation = this.hp * Math.PI/2;
                this.poly.scale = {x: 0, y: 0};

                this.update = function() {
                    this.poly.scale = {x: lerp(this.poly.scale.x, this.targetScale, 0.1), y: lerp(this.poly.scale.y, this.targetScale, 0.1)};
                    this.poly.rotation = lerp(this.poly.rotation, this.hp * Math.PI/2, 0.5);
                };
                this.damage = function(amount) {
                    this.hp -= amount;
                    if(this.hp <= 0) {
                        randomEnd();
                        this.collect();
                        delete tiles[this.x][this.y].front;
                    } else {
                        randomKlik();
                        if(Math.random() > 0.5) {
                            this.poly.moveTo(((Math.random()*tileSize))-tileSize/2, -tileSize/2);
                            this.poly.lineTo(((Math.random()*tileSize))-tileSize/2, tileSize/2);
                        } else {
                            this.poly.moveTo(-tileSize/2, ((Math.random()*tileSize))-tileSize/2);
                            this.poly.lineTo(tileSize/2, ((Math.random()*tileSize))-tileSize/2);
                        }
                        this.targetScale = 0.8;
                        setTimeout(() => {
                            if(this)
                                this.targetScale = 1;
                        }, 100);
                    }
                };
                this.collect = function() {
                    inv.addResource(0, this.poly.x + tileGroup.x, this.poly.y + tileGroup.y);
                    this.poly.destroy();
                    changeCursor(0);
                }

                this.poly.interactive = true;
                this.poly.on("mouseover", (event) => {
                    this.damage(1);
                    changeCursor(1);
                });
                this.poly.on("mouseout", (event) => {
                    changeCursor(0);
                });
                this.poly.on("click", (event) => {
                    this.damage(1);
                });
            }

            var tiles = [];
            for(var i = 0; i < 64; i++) {
                empt = []
                for(var y = 0; y < 36; y++) {
                    empt.push(new tile(i, y));
                }
                tiles.push(empt);
            }

            function spawnResource(x, y, type) {
                switch(type) {
                    case 0:
                        tiles[x][y].front = new resource_red(x, y);
                        break;
                    case 1:
                        tiles[x][y].front = new resource_red(x, y);
                        break;
                    case 2:
                        tiles[x][y].front = new resource_red(x, y);
                        break;
                    case 3:
                        tiles[x][y].front = new resource_red(x, y);
                        break;
                    case 4:
                        tiles[x][y].front = new resource_red(x, y);
                        break;
                    default:
                        console.log("Spawning error @-@");
                }
            }

            function setup() {
                for(var i = 0; i < tiles.length; i++) {
                    for(var y = 0; y < tiles[i].length; y++) {
                        if(Math.random() > 1)
                            spawnResource(i, y, 0);
                    }
                }
                
                tileGroup.position = {x: stageWidth - 65*tileSize, y: (stageHeight - 36*tileSize) / 2};

                //Start the game loop by adding the `gameLoop` function to
                //Pixi's `ticker` and providing it with a `delta` argument.
                app.ticker.add(delta => gameLoop(delta));
            }

            var input = new PIXI.InteractionManager(app.renderer);
            function gameLoop(delta) {
                for(var i = 0; i < tiles.length; i++) {
                    for(var y = 0; y < tiles[i].length; y++) {
                        //if(tiles[i][y].front == undefined) {
                        //    tiles[i][y].front = new resource_red(i, y);
                        //}
                        if(tiles[i][y].front != undefined) {
                            tiles[i][y].front.update();
                            if(Math.random() < 0.0)
                                tiles[i][y].front.damage(1);
                        } else {
                            if(Math.random() < 0.001)
                            spawnResource(i, y, 0);
                        }
                    }
                }
                inv.animUpdate();



                frame++;
            }

            setup()
        </script>
    </body>
</html>
