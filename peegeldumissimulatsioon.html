<html>

    <body>
        <div id="main" style="align-self:center"></div>
        <!--KonvaJS v7.0.3 -->
        <script src="https://unpkg.com/konva@7.0.3/konva.min.js"></script>

        <script>
            var width = window.innerWidth - 18;

            var stage = new Konva.Stage({

            var border = new Konva.Rect({

            //UI and input
            toolbarOpen = true;
            toolbarButtonDir = 180;

            selectedAction = "";
            selectedParam = 0;
            selectedFinishable = false; // stage.on("click") always went last, meaning I couldnt use it to finish placing things

            var buttonX = 60;
            var buttons = [];
            for(var i = 0; i < 10; i++) {
                buttons[i] = group = new Konva.Group({ buttonIndex: i }); //attr is custom, Konva does nothing with it.
                button = group.add(new Konva.Rect({

                }));
                switch(i) {
                    case 0:
                        line = new Konva.Line({
                            points: [buttonX + 10, height - 60, buttonX + 50, height - 40],
                            stroke: 'red',
                            strokeWidth: 2,
                            lineCap: 'round',
                            lineJoin: 'round',
                        });
                        btnText = new Konva.Text({
                            x: buttonX + 5,
                            y: height - 32,
                            fontFamily: 'Calibri',
                            fontSize: 20,
                            text: 'Kiir',
                            fill: 'black',
                        });
                        group.add(line);
                        group.add(btnText);
                        break;
                    case 1:
                        line = new Konva.Line({
                            points: [buttonX + 10, height - 60, buttonX + 50, height - 40],
                            stroke: 'black',
                            strokeWidth: 2,
                            lineCap: 'round',
                            lineJoin: 'round',
                        });
                        btnText = new Konva.Text({
                            x: buttonX + 5,
                            y: height - 32,
                            fontFamily: 'Calibri',
                            fontSize: 20,
                            text: 'Pind',
                            fill: 'black',
                        });
                        group.add(line);
                        group.add(btnText);
                        break;
                    case 2:
                        for(var it = 0; it < 16; it++) {
                            xoffset = Math.sin(it/1.6) * 12;
                            yoffset = Math.cos(it/1.6) * 12;
                            line = new Konva.Line({
                                points: [buttonX + 30, height - 45, buttonX + 30 + xoffset, height - 45 + yoffset],
                                stroke: 'red',
                                strokeWidth: 1,
                                lineCap: 'round',
                                lineJoin: 'round',
                            });
                            group.add(line);
                        }
                        btnText = new Konva.Text({
                            x: buttonX + 5,
                            y: height - 32,
                            fontFamily: 'Calibri',
                            fontSize: 20,
                            text: 'Allikas',
                            fill: 'black',
                        });
                        group.add(btnText);
                        break;
                    case 3:
                        for(var it = 0; it < 5; it++) {
                            line = new Konva.Line({
                                points: [buttonX + 10 + (it*2), height - 50 + (it*3), buttonX + 40 + (it*2), height - 60 + (it*3)],
                                stroke: 'red',
                                strokeWidth: 1,
                                lineCap: 'round',
                                lineJoin: 'round',
                            });
                            group.add(line);
                        }
                        btnText = new Konva.Text({
                            x: buttonX + 5,
                            y: height - 32,
                            fontFamily: 'Calibri',
                            fontSize: 20,
                            text: 'Vihk',
                            fill: 'black',
                        });
                        group.add(btnText);
                        break;
                }                
                button.on("mouseenter", function () {
                    buttonEvent(this, "createHoverOver");
                });
                button.on("mouseleave", function () {
                    buttonEvent(this, "createHoverOff");
                });
                button.on("click", function () {
                    buttonEvent(this, "createClick");
                });
                UILayer.add(buttons[i]);
                buttonX += 70;
            }
            toolbarButton = new Konva.Group();
            var toolbarRect = new Konva.Rect({
                x: 10,
                y: height - 70,
                width: 40,
                height: 60,
                stroke: "black",
                strokeWidth: 3,
                fill: "white",
                cornerRadius: [0, 5, 5, 5],
                shadowOffsetX: 2,
                shadowOffsetY: 2,
            });
            var toolbarArrow = new Konva.Line({
                x: 30,
                y: height - 40,
                points: [-10,+5, 0,-5, 10,5],
                closed: true,
                fill: 'black',
                strokeWidth: 1,
                lineCap: 'round',
                lineJoin: 'round',
                rotation: 180
            });
            toolbarButton.add(toolbarRect);
            toolbarButton.add(toolbarArrow);
            toolbarButton.on("mouseenter", function () {
                buttonEvent(this, "toolbarHoverOver");
            });
            toolbarButton.on("mouseleave", function () {
                buttonEvent(this, "toolbarHoverOff");
            });
            toolbarButton.on("click", function () {
                buttonEvent(this, "toolbarClick");
            });
            UILayer.add(toolbarButton);

            // Input handler
            document.addEventListener('keydown', function(event) {
                if(event.keyCode == 32) {
                    //Same code as in buttonEvent()
                    //If you change it here, change it in the other function too
                    toolbarOpen = !toolbarOpen;
                    if(toolbarOpen) {
                        toolbarButtonDir = 180;
                    } else {
                        toolbarButtonDir = 0;
                    }
                    updateToolbar();
                }
            });
            
            // ray class
            function ray(px, py, dx, dy) {
                this.px = px;
                this.py = py;
                this.dx = dx;
                this.dy = dy;
                this.poly = new Konva.Line({
                    points: [0, 0, 10, 10],
                    stroke: 'red',
                    strokeWidth: 1.5,
                    lineCap: 'round',
                    lineJoin: 'round',
                });
                mainLayer.add(this.poly);
            }

            // convert ray from x, y, x2, y2 to px, py, dx, dy, T
            function convertRay(Ray) {
                //convert global to local
                Ray.dx -= Ray.px;
                Ray.dy -= Ray.py;
                //calc magnitude
                x = Math.pow(Ray.dx, 2);
                y = Math.pow(Ray.dy, 2);
                mag = Math.sqrt(x + y);

                Ray.t = mag; //T IS SET HERE
                //Normalize dir
                Ray.dx /= mag;
                Ray.dy /= mag;
            }

            // line segment class
            function lineSegment(px, py, dx, dy) {
                this.px = px;
                this.py = py;
                this.dx = dx;
                this.dy = dy;
                this.poly = new Konva.Line({
                    points: [0, 0, 10, 10],
                    stroke: 'black',
                    strokeWidth: 1.5,
                    lineCap: 'round',
                    lineJoin: 'round',
                });
                mainLayer.add(this.poly);
            }

            // update konva line class points
            function updatePoints(Ray) {
                pArray = [];
                //set point
                pArray[0] = Ray.px;
                pArray[1] = Ray.py;
                //set dir
                pArray[2] = Ray.px + (Ray.dx * Ray.t);
                pArray[3] = Ray.py + (Ray.dy * Ray.t);

                Ray.poly.points(pArray);
            }

            // Find intersection of RAY & SEGMENT
            function getIntersection(Ray,segment) { 
	            // RAY in parametric: Point + Direction*T1
	            var r_px = Ray.px;
	            var r_py = Ray.py;
	            var r_dx = Ray.dx * Ray.t;
	            var r_dy = Ray.dy * Ray.t;

	            // SEGMENT in parametric: Point + Direction*T2
	            var s_px = segment.px;
	            var s_py = segment.py;
	            var s_dx = segment.dx * segment.t;
	            var s_dy = segment.dy * segment.t;
                
                //debug text
                //writeMessage(r_px + "\n" + r_py + "\n" + r_dx + "\n" + r_dy + "\n" + s_px + "\n" + s_py + "\n" + s_dx + "\n" + s_dy);

                // Are they parallel? If so, no intersect
                var r_mag = Math.sqrt(r_dx*r_dx+r_dy*r_dy);
                var s_mag = Math.sqrt(s_dx*s_dx+s_dy*s_dy);
                if(r_dx/r_mag==s_dx/s_mag && r_dy/r_mag==s_dy/s_mag){ // Directions are the same.
                	return null;
                }
            
                // SOLVE FOR T1 & T2
                // r_px+r_dx*T1 = s_px+s_dx*T2 && r_py+r_dy*T1 = s_py+s_dy*T2
                // ==> T1 = (s_px+s_dx*T2-r_px)/r_dx = (s_py+s_dy*T2-r_py)/r_dy
                // ==> s_px*r_dy + s_dx*T2*r_dy - r_px*r_dy = s_py*r_dx + s_dy*T2*r_dx - r_py*r_dx
                // ==> T2 = (r_dx*(s_py-r_py) + r_dy*(r_px-s_px))/(s_dx*r_dy - s_dy*r_dx)
                var T2 = (r_dx*(s_py-r_py) + r_dy*(r_px-s_px))/(s_dx*r_dy - s_dy*r_dx);
                var T1 = (s_px+s_dx*T2-r_px)/r_dx;
            
                // Must be within parametic whatevers for RAY/SEGMENT
                if(T1<0) return null;
                if(T2<0 || T2>1) return null;
                
                // Return the POINT OF INTERSECTION
                return {
                	x: r_px+r_dx*T1,
                	y: r_py+r_dy*T1,
                	param: T1
                };


            }

            // dot product. Required in reflect();
            function dot_product(x1, y1, x2, y2) {
                vector1 = [x1, y1];
                vector2 = [x2, y2];
                var result = 0;
                for (var i = 0; i < 2; i++) {
                  result += vector1[i] * vector2[i];
                }
                return result;
            }

            // Reflect vector :)
            function reflect(Ray,segment) {
                ny = segment.dx; //n = normal
                nx = segment.dy;
                ny = ny * -1;
                // -- normalizing normal (?) --
                //mag
                x = Math.pow(nx, 2);
                y = Math.pow(ny, 2);
                mag = Math.sqrt(x + y);
                //Normalize dir
                nx /= mag;
                ny /= mag;

                ix = Ray.dx; // i = incoming ray
                iy = Ray.dy;
                // -- normalizing incoming ray --
                //mag
                x2 = Math.pow(ix, 2);
                y2 = Math.pow(iy, 2);
                mag2 = Math.sqrt(x2 + y2);
                //Normalize dir
                ix /= mag2;
                iy /= mag2;

                //debug text
                //writeMessage(ix + "\n" + iy + "\n" + nx + "\n" + ny + "\n");

                //r=d−2(d⋅n)n
                dot = dot_product(ny, nx, iy, ix);
                rx = ix - 2 * (dot) * nx;
                ry = iy - 2 * (dot) * ny;

                return {
                    x: rx,
                    y: ry
                };
            }




            //Actual objects, later copied to arrays that the sim handles
            var rays = [];
            var segments = [];
            var rayPoints = [];
            var rayArrays = [];

            var simRays = []; //Rays that the sim handles
            var simSegments = []; //Segments that the sim handles
            simSegments[0] = new lineSegment(1920 / 1.5, 200, 1920 / 1.5, 900);
            convertRay(simSegments[0]);
            updatePoints(simSegments[0]);
            simSegments[1] = new lineSegment(100, 100, 100, 1000);
            convertRay(simSegments[1]);
            updatePoints(simSegments[1]);

            //classes for placing
            function placedRay() {
                this.px = 0;
                this.py = 0;
                this.dx = 0;
                this.dy = 0;
                this.index = simRays.push([new ray(0, 0, 25, 25)]) - 1;
                this.ray = simRays[this.index][0];
                console.log(this.ray);
                this.updateRay = function() {
                    this.ray.px = this.px;
                    this.ray.py = this.py;
                    this.ray.dx = this.dx;
                    this.ray.dy = this.dy;
                    convertRay(this.ray);
                    updatePoints(this.ray);
                }
            }

            var bounceLength = 10;

            //debug circle
            var circle = new Konva.Circle({
                x: 0,
                y: 0,
                radius: 5,
                fill: 'green'
            });
            mainLayer.add(circle);

            //update simulation
            function updateSim() {
                var mpos = stage.getPointerPosition();
                //Rays
                if(mpos!=null && selectedAction == "placeRay") {
                    rays[selectedParam].px = mpos.x;
                    rays[selectedParam].py = mpos.y;
                    rays[selectedParam].dx = mpos.x - 10;
                    rays[selectedParam].dy = mpos.y - 10;
                    rays[selectedParam].updateRay()
                }
                else if(mpos!=null && selectedAction == "placeRayDirection") {
                    rays[selectedParam].dx = (mpos.x - rays[selectedParam].px) * 10000;
                    rays[selectedParam].dy = (mpos.y - rays[selectedParam].py) * 10000;
                    rays[selectedParam].updateRay();
                }
                for(var i = 0; i < simRays.length; i++) {
                    //creating rays
                    lastSegmentx = -1;
                    for(var x = 0; x <= bounceLength; x++) {
                        if(simRays[i][x])
                        {
                            //find closest segment
                            var result = null;
                            var resultDist = 100000;
                            var segmentx = 0;
                            for(var s = 0; s < simSegments.length; s++) {
                                //this if() prevents reflected rays from intersecting with the same segments they are being reflected on
                                if(s != lastSegmentx) {
                                    loopResult = getIntersection(simRays[i][x], simSegments[s]);
                                    if(loopResult != null && loopResult.param < resultDist) {
                                        result = loopResult;
                                        resultDist = loopResult.param;
                                        segmentx = s;
                                    }
                                }
                            }
                            lastSegmentx = segmentx;
                            //if one exists then calc reflections if required
                            if(result != null) {
                                circle.x(result.x);
                                circle.y(result.y);
                                simRays[i][x].dx = result.x;
                                simRays[i][x].dy = result.y;
                                convertRay(simRays[i][x]);
                                updatePoints(simRays[i][x]);

                                //if we havent reached the end of the bounces create a new ray
                                if(x != bounceLength) {
                                // destroy old rays
                                    if(simRays[i][x + 1])
                                        simRays[i][x + 1].poly.destroy();

                                    // make new ray
                                    reflec = reflect(simRays[i][x], simSegments[segmentx]);
                                    simRays[i][x + 1] = new ray(result.x, result.y, reflec.x * 1000 + result.x, reflec.y * 1000 + result.y);
                                    convertRay(simRays[i][x + 1]);
                                    updatePoints(simRays[i][x + 1]);
                                }
                            } else {
                                for(var del = x + 1; del < simRays[i].length; del++) {
                                    if(simRays[i][del]) {
                                        simRays[i][del].poly.destroy();
                                        simRays[i].splice(del, 1);
                                    }
                                }
                            }
                        }
                    }
                }
                //writeMessage(rays[0][2].px + "\n" + rays[0][2].py + "\n" + rays[0][2].dx + "\n" + rays[0][2].dy + "\n" + rays[0][2].t + "\n" + Math.sqrt(Math.pow(rays[0][2].dx, 2) + Math.pow(rays[0][2].dy, 2)) + "\n");
                stage.clear();
                stage.draw();
            }

            // Function that handles all button events (hovering, clicking)
            function buttonEvent(button, event) {
                switch(event) {
                    case "createHoverOver":
                        if(toolbarOpen) {
                            var tween = new Konva.Tween({
                                node: button.getChildren()[0],
                                duration: 0.1,
                                easing: Konva.Easings.EaseInOut,
                                fill: "#d9d9d9",
                            });
                            tween.play();
                            var tween2 = new Konva.Tween({
                                node: button,
                                duration: 0.1,
                                easing: Konva.Easings.EaseInOut,
                                y: -10,
                            });
                            tween2.play();
                        }
                        break;
                    case "createHoverOff":
                        if(toolbarOpen) {
                            var tween = new Konva.Tween({
                                node: button.getChildren()[0],
                                duration: 0.1,
                                easing: Konva.Easings.EaseInOut,
                                fill: "white",
                            });
                            tween.play();
                            var tween2 = new Konva.Tween({
                                node: button,
                                duration: 0.1,
                                easing: Konva.Easings.EaseInOut,
                                y: 0,
                            });
                            tween2.play();                            
                        }
                        break;
                    case "toolbarHoverOver": //Button to close the toolbar
                        var tween = new Konva.Tween({
                            node: button.getChildren()[0],
                            duration: 0.1,
                            easing: Konva.Easings.EaseInOut,
                            fill: "#d9d9d9",
                        });
                        tween.play();
                        break;
                    case "toolbarHoverOff": //Button to close the toolbar
                        var tween = new Konva.Tween({
                            node: button.getChildren()[0],
                            duration: 0.1,
                            easing: Konva.Easings.EaseInOut,
                            fill: "white",
                        });
                        tween.play();
                        break;
                    case "toolbarClick":
                        //Same code as in Input handler
                        //If you change it here, change it in the other function too
                        toolbarOpen = !toolbarOpen;
                        if(toolbarOpen) {
                            toolbarButtonDir = 180;
                        } else {
                            toolbarButtonDir = 0;
                        }
                        updateToolbar();
                        break;
                    case "createClick":
                        btnIndex = button.getAttr("buttonIndex");
                        keepButton = btnIndex;
                        toolbarOpen = false;
                        updateToolbar();
                        switch(btnIndex) {
                            case 0:
                                selectedAction = "placeRay"
                                selectedParam = rays.push(new placedRay()) - 1;
                                break;
                            case 1:
                                selectedAction = "placeSegment"
                                break;
                            case 2:
                                selectedAction = "place"
                                break;
                            case 3:
                                selectedAction = "place"
                                break;
                            default:
                                console.log("buttonEvent() createClick Error :|");
                        }
                        break;
                    default:
                        console.log("buttonEvent() Error :|");
                }
            }

            stage.on("click", function () {
                if(selectedAction != "" && selectedFinishable) {
                    if(selectedAction == "placeRay") { //if placing has two steps we put exceptions here
                        selectedAction = "placeRayDirection"
                    } else if(selectedAction == "placeSegment") {
                        selectedAction = "placeSegmentDirection"
                    } else {
                        selectedFinishable = false;
                        selectedAction = "";
                        selecterParam = -1;
                        toolbarOpen = true;
                        updateToolbar();
                    }
                }
            });

            function updateToolbar() {
                // toolbar button
                // we use toolbarButtonDir to specify direction, useful if we dont need to reverse the arrow
                var tween = new Konva.Tween({
                    node: toolbarArrow,
                    duration: 0.3,
                    easing: Konva.Easings.EaseInOut,
                    rotation: toolbarButtonDir,
                });
                tween.play();

                if(toolbarOpen) {
                    //Bring up buttons
                    for(var i = 0; i < buttons.length; i++) {
                        var tween = new Konva.Tween({
                            node: buttons[i],
                            duration: 0.1,
                            easing: Konva.Easings.EaseInOut,
                            y: 0,
                        });
                        tween.play();
                        //fix colors if needed
                        var tween2 = new Konva.Tween({
                            node: buttons[i].getChildren()[0],
                            duration: 0.1,
                            easing: Konva.Easings.EaseInOut,
                            fill: "white",
                        });
                        tween2.play();
                    }
                } else {
                    //Send buttons away
                    for(var i = 0; i < buttons.length; i++) {
                        if(i != keepButton) {
                            var tween = new Konva.Tween({
                            node: buttons[i],
                            duration: 0.1,
                            easing: Konva.Easings.EaseInOut,
                            y: 70,
                            });
                            tween.play();
                        }
                    }
                }

                keepButton = -1;
            }

            stage.on("mousemove", function () {
                if(selectedAction != "") {
                    selectedFinishable = true;
                }
                updateSim();
            });

            // add the layer to the stage
            stage.add(mainLayer);
            stage.add(UILayer)
            stage.draw();
        </script>
